<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9956B"/>
      <stop offset="40%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#B8805A"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8805A"/>
      <stop offset="100%" stop-color="#C9956B"/>
    </linearGradient>
    <radialGradient id="beadShine" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C9956B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="beadShadow" cx="60%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#8B6040" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B6040" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(36, 60)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>
    <circle cx="0" cy="0" r="26" fill="url(#g1)" opacity="0.12"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="url(#g1)" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#g2)" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="26" fill="url(#beadShadow)"/>
    <circle cx="0" cy="0" r="26" fill="url(#beadShine)"/>
    <path d="M -16,-16 A 20,20 0 0,1 10,-23" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
    <ellipse cx="14" cy="14" rx="5" ry="3" fill="#FFFFFF" opacity="0.2" transform="rotate(-25, 14, 14)"/>
    <circle cx="0" cy="0" r="3.5" fill="#C9956B" opacity="0.4"/>
    <circle cx="0" cy="-40" r="2.5" fill="url(#g1)" opacity="0.6" filter="url(#glow)"/>
    <circle cx="34" cy="-24" r="1.8" fill="url(#g1)" opacity="0.45"/>
    <circle cx="38" cy="0" r="2" fill="url(#g1)" opacity="0.5"/>
    <circle cx="34" cy="24" r="1.8" fill="url(#g1)" opacity="0.45"/>
    <circle cx="0" cy="40" r="2.5" fill="url(#g1)" opacity="0.6" filter="url(#glow)"/>
    <circle cx="-34" cy="24" r="1.8" fill="url(#g1)" opacity="0.45"/>
    <circle cx="-38" cy="0" r="2" fill="url(#g1)" opacity="0.5"/>
    <circle cx="-34" cy="-24" r="1.8" fill="url(#g1)" opacity="0.45"/>
  </g>

  <text x="84" y="44" font-family="'Playfair Display', Georgia, serif" font-size="36"
        font-weight="700" fill="#FFFFFF" letter-spacing="3">Bo</text>
  <text x="135" y="44" font-family="'Playfair Display', Georgia, serif" font-size="36"
        font-weight="400" fill="#C9956B" letter-spacing="3" font-style="italic">Mei</text>
  <text x="208" y="44" font-family="'Playfair Display', Georgia, serif" font-size="36"
        font-weight="700" fill="#FFFFFF" letter-spacing="3">Er</text>

  <line x1="84" y1="60" x2="310" y2="60" stroke="url(#g1)" stroke-width="1" opacity="0.5"/>

  <text x="84" y="86" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="20"
        font-weight="500" fill="#C9956B" letter-spacing="6">鉑魅兒</text>

  <text x="84" y="106" font-family="'Noto Sans TC', sans-serif" font-size="10"
        fill="#888888" letter-spacing="2.5" font-weight="400">手作琉璃 · 配飾選物</text>
</svg>
