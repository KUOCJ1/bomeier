<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="鉑魅兒管理後台">
  <title>管理後台 | 鉑魅兒 Bo Mei Er</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<nav class="nav scrolled" style="background:#0A1628;">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo"><img src="../images/brand/logo-white.svg" alt="Bo Mei Er" class="nav-logo-img" style="height:24px;"></a>
    <div class="nav-links">
      <span style="color:#C9956B;font-size:13px;">管理後台</span>
      <span style="color:#888;font-size:12px;" id="admin-email"></span>
      <a href="#" onclick="BME_logout();return false;" style="font-size:13px;color:#C97B6B;">登出</a>
    </div>
  </div>
</nav>

<main style="padding-top:80px;">
  <div id="admin-loading" style="text-align:center;padding:80px 20px;color:#888;">驗證權限中…</div>

  <div id="admin-content" style="display:none;">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <button class="admin-nav-btn active" data-page="orders" onclick="BME_ADMIN.loadPage('orders')">📦 訂單管理</button>
        <button class="admin-nav-btn" data-page="custom" onclick="BME_ADMIN.loadPage('custom')">🎨 客製化訂單</button>
        <button class="admin-nav-btn" data-page="custom-options" onclick="BME_ADMIN.loadPage('custom-options')">🧵 客製選項</button>
        <button class="admin-nav-btn" data-page="products" onclick="BME_ADMIN.loadPage('products')">💎 商品管理</button>
        <button class="admin-nav-btn" data-page="posts" onclick="BME_ADMIN.loadPage('posts')">📝 網誌文章</button>
        <button class="admin-nav-btn" data-page="permissions" onclick="BME_ADMIN.loadPage('permissions')">🔐 權限設定</button>
        <hr style="border:none;border-top:1px solid rgba(255,255,255,0.1);margin:16px 0;">
        <a href="../index.html" style="display:block;font-size:13px;color:#888;padding:8px;">← 回到前台</a>
      </aside>
      <div class="admin-main">
        <div id="admin-panel-content"></div>
      </div>
    </div>
  </div>
</main>

<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  BME_ADMIN.init();
});
</script>
</body>
</html>
