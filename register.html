        <div id="register-error" class="form-error" style="display:none;"></div>

          <p>註冊成功！請前往你的 Email 收信並驗證帳號，驗證完成後即可登入。</p>

            <label class="form-label" for="reg-email">Email</label>
            <input type="email" id="reg-email" class="form-input" placeholder="example@email.com" required>

          <div class="form-group">
            <label class="form-label" for="reg-password">密碼</label>
            <input type="password" id="reg-password" class="form-input" placeholder="至少 6 碼" required minlength="6">
          </div>

          <div class="form-group">
            <label class="form-label">你喜歡的風格（可複選）</label>
            <div class="style-checkboxes">
              <label class="style-checkbox"><input type="checkbox" name="style" value="romantic_rose"> 浪漫復古</label>

<script>
async function handleRegister(event) {
  event.preventDefault();
  const btn = document.getElementById('reg-submit-btn');
  const errorEl = document.getElementById('register-error');
  const successEl = document.getElementById('register-success');
  const form = document.getElementById('register-form');

  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '註冊中…';

  try {
    const nickname = document.getElementById('reg-nickname').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const styles = Array.from(document.querySelectorAll('input[name="style"]:checked')).map(cb => cb.value);

    await BME_register(email, password, nickname);

    // 註冊風格偏好（需等 session 建立後）
    // 實務上 style_preferences 可在會員編輯資料時更新
    // 此處先導到成功頁

    form.style.display = 'none';
    successEl.style.display = 'block';
  } catch (err) {
    errorEl.textContent = (err && err.message) ? err.message : '註冊失敗，請稍後再試。';
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '註冊';
  }
  return false;
}
</script>
