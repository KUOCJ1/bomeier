<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="重設鉑魅兒帳號密碼。">
  <title>重設密碼 | 鉑魅兒 Bo Mei Er</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/brand/logo-icon-64.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav scrolled">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="images/brand/logo-nav.png" alt="Bo Mei Er" class="nav-logo-img"></a>
    <div class="nav-links">
      <a href="products.html">全部商品</a><a href="custom.html">客製訂製</a>
      <a href="about.html">關於</a>
      <a href="journal.html">誌</a>
      <div id="auth-nav-items"></div>
    </div>
  </div>
</nav>

<main>
  <div class="breadcrumb">
    <a href="index.html">首頁</a><span class="separator">／</span><span>重設密碼</span>
  </div>

  <section class="section">
    <div class="section-inner" style="max-width:520px;">
      <div class="section-header">
        <div class="section-divider-thick"></div>
        <h2>重設密碼</h2>
        <p class="section-subtitle">Reset Password</p>
        <p style="font-size:14px;color:#666;max-width:560px;margin:10px auto 0;">如果你已經收到重設信，點進來後直接設定新密碼。若還沒收到，可以先送出重設信。</p>
      </div>

      <div id="reset-request-wrap">
        <div id="reset-request-error" class="form-error" style="display:none;"></div>
        <div id="reset-request-success" class="form-success" style="display:none;"></div>
        <form id="reset-request-form" onsubmit="return handleResetRequest(event)">
          <div class="form-group">
            <label class="form-label" for="reset-email">Email</label>
            <input type="email" id="reset-email" class="form-input" value="kuocj1@gmail.com" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;" id="reset-request-btn">寄送重設信</button>
        </form>
      </div>

      <div id="reset-password-wrap" style="display:none;">
        <div id="reset-password-error" class="form-error" style="display:none;"></div>
        <div id="reset-password-success" class="form-success" style="display:none;"></div>
        <form id="reset-password-form" onsubmit="return handlePasswordUpdate(event)">
          <div class="form-group">
            <label class="form-label" for="new-password">新密碼</label>
            <input type="password" id="new-password" class="form-input" minlength="6" required placeholder="至少 6 碼">
          </div>
          <div class="form-group">
            <label class="form-label" for="new-password-confirm">確認新密碼</label>
            <input type="password" id="new-password-confirm" class="form-input" minlength="6" required placeholder="再輸入一次">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;" id="reset-password-btn">更新密碼</button>
        </form>
      </div>
    </div>
  </section>
</main>

<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script>
let recoverySessionReady = false;

function showResetPasswordForm() {
  document.getElementById('reset-request-wrap').style.display = 'none';
  document.getElementById('reset-password-wrap').style.display = 'block';
}

function showResetRequestForm() {
  document.getElementById('reset-request-wrap').style.display = 'block';
  document.getElementById('reset-password-wrap').style.display = 'none';
}

async function handleResetRequest(event) {
  event.preventDefault();
  const btn = document.getElementById('reset-request-btn');
  const errorEl = document.getElementById('reset-request-error');
  const successEl = document.getElementById('reset-request-success');

  errorEl.style.display = 'none';
  successEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '送出中…';

  try {
    const email = document.getElementById('reset-email').value.trim();
    const redirectTo = window.location.origin + '/reset-password.html';
    await BME_sendPasswordReset(email, redirectTo);
    successEl.textContent = '重設信已送出，請到信箱收信後點連結回來設定新密碼。';
    successEl.style.display = 'block';
  } catch (err) {
    errorEl.textContent = (err && err.message) ? err.message : '寄送失敗，請稍後再試。';
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '寄送重設信';
  }
  return false;
}

async function handlePasswordUpdate(event) {
  event.preventDefault();
  const btn = document.getElementById('reset-password-btn');
  const errorEl = document.getElementById('reset-password-error');
  const successEl = document.getElementById('reset-password-success');

  errorEl.style.display = 'none';
  successEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '更新中…';

  try {
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('new-password-confirm').value;
    if (password !== confirm) throw new Error('兩次密碼不一致');
    await BME_updatePassword(password);
    successEl.textContent = '密碼已更新，現在可以直接登入。';
    successEl.style.display = 'block';
  } catch (err) {
    errorEl.textContent = (err && err.message) ? err.message : '更新失敗，請稍後再試。';
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '更新密碼';
  }
  return false;
}

document.addEventListener('DOMContentLoaded', async function() {
  try {
    const client = await initSupabase();
    if (!client) return;

    client.auth.onAuthStateChange(function(event, session) {
      if (event === 'PASSWORD_RECOVERY' || session) {
        recoverySessionReady = true;
        showResetPasswordForm();
      }
    });

    const { data } = await client.auth.getSession();
    if (data && data.session) {
      showResetPasswordForm();
    } else {
      showResetRequestForm();
    }
  } catch (err) {
    showResetRequestForm();
  }
});
</script>
</body>
</html>
